openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: investors
    description: Investor signup operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /investors:
    post:
      operationId: createInvestor
      tags: [investors]
      summary: Sign up for investor access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvestorInput"
      responses:
        "201":
          description: Investor registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investor"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /investors/count:
    get:
      operationId: getInvestorCount
      tags: [investors]
      summary: Get number of registered investors
      responses:
        "200":
          description: Investor count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestorCount"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Investor:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - fullName
        - email
        - createdAt
    InvestorInput:
      type: object
      properties:
        fullName:
          type: string
          minLength: 1
        email:
          type: string
      required:
        - fullName
        - email
    InvestorCount:
      type: object
      properties:
        count:
          type: integer
      required:
        - count
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
